services:
  rabbitmq_simulador:
    image: rabbitmq:3-management-alpine
    container_name: broker_montecarlo
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5

  productor:
    build:
      context: .
      dockerfile: Dockerfile.productor
    container_name: productor_simulacion
    environment:
      - RABBITMQ_HOST=rabbitmq_simulador
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
    depends_on:
      rabbitmq_simulador:
        condition: service_healthy

  consumidor_1:
    build:
      context: .
      dockerfile: Dockerfile.consumidor
    environment:
      - RABBITMQ_HOST=rabbitmq_simulador
      - CONSUMIDOR_ID=consumidor-1
    depends_on:
      rabbitmq_simulador:
        condition: service_healthy

  consumidor_2:
    build:
      context: .
      dockerfile: Dockerfile.consumidor
    environment:
      - RABBITMQ_HOST=rabbitmq_simulador
      - CONSUMIDOR_ID=consumidor-2
    depends_on:
      rabbitmq_simulador:
        condition: service_healthy

  consumidor_3:
    build:
      context: .
      dockerfile: Dockerfile.consumidor
    environment:
      - RABBITMQ_HOST=rabbitmq_simulador
      - CONSUMIDOR_ID=consumidor-3
    depends_on:
      rabbitmq_simulador:
        condition: service_healthy

  consumidor_4:
    build:
      context: .
      dockerfile: Dockerfile.consumidor
    environment:
      - RABBITMQ_HOST=rabbitmq_simulador
      - CONSUMIDOR_ID=consumidor-4
    depends_on:
      rabbitmq_simulador:
        condition: service_healthy
